# ── Liquibase Properties (CI / Template) ──
# Nilai diisi dari environment variables / GitHub Secrets saat runtime.
# File ini AMAN di-commit karena tidak mengandung kredensial.

url=${DB_URL}
username=${DB_USERNAME}
password=${DB_PASSWORD}
driver=com.mysql.cj.jdbc.Driver

changeLogFile=changelog/db.changelog-master.xml
logLevel=INFO
