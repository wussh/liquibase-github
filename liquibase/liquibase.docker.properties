# ── Liquibase Properties (LOCAL DOCKER) ──
# Digunakan saat menjalankan via docker-compose atau CLI lokal

url=jdbc:mysql://mysql:3306/liquibase_dev?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
username=liquibase_user
password=liquibase_pass
driver=com.mysql.cj.jdbc.Driver

# Lokasi changelog (relatif ke folder ini)
changeLogFile=changelog/db.changelog-master.xml

# Logging
logLevel=INFO

# Liquibase Hub (opsional — hapus jika tidak dipakai)
# liquibase.hub.apiKey=YOUR_KEY_HERE
