# ══════════════════════════════════════════════════════════════
# CASE 1 — 1 MySQL, 4 Database (Microservices on single server)
# CASE 2 — 2 MySQL, 2 Database each (Isolated servers)
#
# Services:
#   mysql-main  → db_users, db_orders       (main server)
#   mysql-svc   → db_payments, db_inventory (service server)
#
# GUI:
#   adminer-main → http://localhost:8081
#   adminer-svc  → http://localhost:8082
# ══════════════════════════════════════════════════════════════

services:

  # ── MySQL Server 1 (main): users + orders ──────────────────
  mysql-main:
    image: mysql:8.0
    container_name: lb-mysql-main
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: liquibase_user
      MYSQL_PASSWORD: liquibase_pass
    volumes:
      - mysql_main_data:/var/lib/mysql
      - ./docker/mysql-main/init:/docker-entrypoint-initdb.d
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - lb-net

  # ── MySQL Server 2 (services): payments + inventory ────────
  mysql-svc:
    image: mysql:8.0
    container_name: lb-mysql-svc
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: liquibase_user
      MYSQL_PASSWORD: liquibase_pass
    volumes:
      - mysql_svc_data:/var/lib/mysql
      - ./docker/mysql-svc/init:/docker-entrypoint-initdb.d
    ports:
      - "3308:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - lb-net

  # ── Adminer untuk mysql-main ───────────────────────────────
  adminer-main:
    image: adminer:latest
    container_name: lb-adminer-main
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      - mysql-main
    networks:
      - lb-net

  # ── Adminer untuk mysql-svc ────────────────────────────────
  adminer-svc:
    image: adminer:latest
    container_name: lb-adminer-svc
    restart: unless-stopped
    ports:
      - "8082:8080"
    depends_on:
      - mysql-svc
    networks:
      - lb-net

  # ── Liquibase: db_users (mysql-main) ──────────────────────
  lb-users:
    build:
      context: ./docker/liquibase
      dockerfile: Dockerfile
    image: liquibase-mysql:4.27
    container_name: lb-runner-users
    depends_on:
      mysql-main:
        condition: service_healthy
    volumes:
      - ./services/users/changelog:/liquibase/changelog
    command:
      - --url=jdbc:mysql://mysql-main:3306/db_users?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - --username=liquibase_user
      - --password=liquibase_pass
      - --driver=com.mysql.cj.jdbc.Driver
      - update
      - --changelog-file=changelog/db.changelog-master.xml
    networks:
      - lb-net

  # ── Liquibase: db_orders (mysql-main) ─────────────────────
  lb-orders:
    build:
      context: ./docker/liquibase
      dockerfile: Dockerfile
    image: liquibase-mysql:4.27
    container_name: lb-runner-orders
    depends_on:
      mysql-main:
        condition: service_healthy
    volumes:
      - ./services/orders/changelog:/liquibase/changelog
    command:
      - --url=jdbc:mysql://mysql-main:3306/db_orders?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - --username=liquibase_user
      - --password=liquibase_pass
      - --driver=com.mysql.cj.jdbc.Driver
      - update
      - --changelog-file=changelog/db.changelog-master.xml
    networks:
      - lb-net

  # ── Liquibase: db_payments (mysql-svc) ────────────────────
  lb-payments:
    build:
      context: ./docker/liquibase
      dockerfile: Dockerfile
    image: liquibase-mysql:4.27
    container_name: lb-runner-payments
    depends_on:
      mysql-svc:
        condition: service_healthy
    volumes:
      - ./services/payments/changelog:/liquibase/changelog
    command:
      - --url=jdbc:mysql://mysql-svc:3306/db_payments?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - --username=liquibase_user
      - --password=liquibase_pass
      - --driver=com.mysql.cj.jdbc.Driver
      - update
      - --changelog-file=changelog/db.changelog-master.xml
    networks:
      - lb-net

  # ── Liquibase: db_inventory (mysql-svc) ───────────────────
  lb-inventory:
    build:
      context: ./docker/liquibase
      dockerfile: Dockerfile
    image: liquibase-mysql:4.27
    container_name: lb-runner-inventory
    depends_on:
      mysql-svc:
        condition: service_healthy
    volumes:
      - ./services/inventory/changelog:/liquibase/changelog
    command:
      - --url=jdbc:mysql://mysql-svc:3306/db_inventory?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - --username=liquibase_user
      - --password=liquibase_pass
      - --driver=com.mysql.cj.jdbc.Driver
      - update
      - --changelog-file=changelog/db.changelog-master.xml
    networks:
      - lb-net

volumes:
  mysql_main_data:
  mysql_svc_data:

networks:
  lb-net:
    driver: bridge
