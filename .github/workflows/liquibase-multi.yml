name: Liquibase Multi-DB CI/CD

on:
  push:
    branches: [main, staging]
    paths:
      - 'services/**'
  pull_request:
    branches: [main]
    paths:
      - 'services/**'

# ── Deteksi service mana yang berubah ─────────────────────────
# Setiap job hanya jalan jika folder service-nya berubah.
# Menggunakan matrix strategy agar semua service bisa parallel.

jobs:

  # ════════════════════════════════════════════════════════════
  # JOB 1 — Detect changed services
  # ════════════════════════════════════════════════════════════
  detect-changes:
    name: 🔎 Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      users:     ${{ steps.filter.outputs.users }}
      orders:    ${{ steps.filter.outputs.orders }}
      payments:  ${{ steps.filter.outputs.payments }}
      inventory: ${{ steps.filter.outputs.inventory }}
    steps:
      - uses: actions/checkout@v4

      - name: Filter changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            users:
              - 'services/users/**'
            orders:
              - 'services/orders/**'
            payments:
              - 'services/payments/**'
            inventory:
              - 'services/inventory/**'

  # ════════════════════════════════════════════════════════════
  # JOB 2 — Validate semua service yang berubah (parallel)
  # Gunakan matrix agar bisa jalan bersamaan
  # ════════════════════════════════════════════════════════════
  validate:
    name: 🔍 Validate — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: detect-changes

    strategy:
      fail-fast: false     # jangan stop jika salah satu gagal
      matrix:
        include:
          - service: users
            db_name: db_users
            mysql_host: mysql-main
            changed: ${{ needs.detect-changes.outputs.users }}

          - service: orders
            db_name: db_orders
            mysql_host: mysql-main
            changed: ${{ needs.detect-changes.outputs.orders }}

          - service: payments
            db_name: db_payments
            mysql_host: mysql-svc
            changed: ${{ needs.detect-changes.outputs.payments }}

          - service: inventory
            db_name: db_inventory
            mysql_host: mysql-svc
            changed: ${{ needs.detect-changes.outputs.inventory }}

    # Hanya jalan jika service ini ada perubahan
    if: >
      needs.detect-changes.outputs.users == 'true' ||
      needs.detect-changes.outputs.orders == 'true' ||
      needs.detect-changes.outputs.payments == 'true' ||
      needs.detect-changes.outputs.inventory == 'true'

    services:
      # Spin up MySQL ephemeral untuk validate
      mysql-main:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_USER: liquibase_user
          MYSQL_PASSWORD: liquibase_pass
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -prootpassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      mysql-svc:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_USER: liquibase_user
          MYSQL_PASSWORD: liquibase_pass
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -prootpassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      # Skip jika service ini tidak berubah
      - name: Skip check
        if: matrix.changed != 'true'
        run: echo "⏭️  Skipping ${{ matrix.service }} — no changes detected"

      - name: Create database ${{ matrix.db_name }}
        if: matrix.changed == 'true'
        run: |
          mysql -h 127.0.0.1 -P 3306 \
            -u root -prootpassword \
            -e "CREATE DATABASE IF NOT EXISTS ${{ matrix.db_name }};
                GRANT ALL ON ${{ matrix.db_name }}.* TO 'liquibase_user'@'%';
                FLUSH PRIVILEGES;"
        env:
          MYSQL_HOST: ${{ matrix.mysql_host }}

      - name: Liquibase validate — ${{ matrix.service }}
        if: matrix.changed == 'true'
        uses: liquibase/liquibase-github-action@v7
        with:
          operation: validate
          classpath: services/${{ matrix.service }}/changelog
          changeLogFile: db.changelog-master.xml
          username: liquibase_user
          password: liquibase_pass
          url: jdbc:mysql://localhost:3306/${{ matrix.db_name }}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC

      - name: Liquibase updateSQL (dry-run) — ${{ matrix.service }}
        if: matrix.changed == 'true'
        uses: liquibase/liquibase-github-action@v7
        with:
          operation: updateSQL
          classpath: services/${{ matrix.service }}/changelog
          changeLogFile: db.changelog-master.xml
          username: liquibase_user
          password: liquibase_pass
          url: jdbc:mysql://localhost:3306/${{ matrix.db_name }}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC

  # ════════════════════════════════════════════════════════════
  # JOB 3 — Deploy Staging (parallel per service)
  # ════════════════════════════════════════════════════════════
  deploy-staging:
    name: 🚀 Staging — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [detect-changes, validate]
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    environment: staging

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: users
            db_name: db_users
            secret_url: DB_URL_USERS_STAGING
            changed: ${{ needs.detect-changes.outputs.users }}

          - service: orders
            db_name: db_orders
            secret_url: DB_URL_ORDERS_STAGING
            changed: ${{ needs.detect-changes.outputs.orders }}

          - service: payments
            db_name: db_payments
            secret_url: DB_URL_PAYMENTS_STAGING
            changed: ${{ needs.detect-changes.outputs.payments }}

          - service: inventory
            db_name: db_inventory
            secret_url: DB_URL_INVENTORY_STAGING
            changed: ${{ needs.detect-changes.outputs.inventory }}

    steps:
      - uses: actions/checkout@v4

      - name: Skip check
        if: matrix.changed != 'true'
        run: echo "⏭️  Skipping ${{ matrix.service }} — no changes"

      - name: Liquibase status — ${{ matrix.service }}
        if: matrix.changed == 'true'
        uses: liquibase/liquibase-github-action@v7
        with:
          operation: status
          classpath: services/${{ matrix.service }}/changelog
          changeLogFile: db.changelog-master.xml
          username: ${{ secrets.DB_USERNAME_STAGING }}
          password: ${{ secrets.DB_PASSWORD_STAGING }}
          url: ${{ secrets[matrix.secret_url] }}

      - name: Liquibase update — ${{ matrix.service }}
        if: matrix.changed == 'true'
        uses: liquibase/liquibase-github-action@v7
        with:
          operation: update
          classpath: services/${{ matrix.service }}/changelog
          changeLogFile: db.changelog-master.xml
          username: ${{ secrets.DB_USERNAME_STAGING }}
          password: ${{ secrets.DB_PASSWORD_STAGING }}
          url: ${{ secrets[matrix.secret_url] }}

  # ════════════════════════════════════════════════════════════
  # JOB 4 — Deploy Production (parallel per service, butuh approval)
  # ════════════════════════════════════════════════════════════
  deploy-production:
    name: 🏭 Production — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [detect-changes, validate]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production   # ← wajib approve manual

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: users
            secret_url: DB_URL_USERS_PROD
            changed: ${{ needs.detect-changes.outputs.users }}

          - service: orders
            secret_url: DB_URL_ORDERS_PROD
            changed: ${{ needs.detect-changes.outputs.orders }}

          - service: payments
            secret_url: DB_URL_PAYMENTS_PROD
            changed: ${{ needs.detect-changes.outputs.payments }}

          - service: inventory
            secret_url: DB_URL_INVENTORY_PROD
            changed: ${{ needs.detect-changes.outputs.inventory }}

    steps:
      - uses: actions/checkout@v4

      - name: Skip check
        if: matrix.changed != 'true'
        run: echo "⏭️  Skipping ${{ matrix.service }} — no changes"

      - name: Liquibase update — ${{ matrix.service }}
        if: matrix.changed == 'true'
        uses: liquibase/liquibase-github-action@v7
        with:
          operation: update
          classpath: services/${{ matrix.service }}/changelog
          changeLogFile: db.changelog-master.xml
          username: ${{ secrets.DB_USERNAME_PROD }}
          password: ${{ secrets.DB_PASSWORD_PROD }}
          url: ${{ secrets[matrix.secret_url] }}
